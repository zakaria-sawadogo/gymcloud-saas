name: gymcloud

services:
  # ── Base de données ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymcloud_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_dev_only}
      POSTGRES_DB: gymcloud
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Important : rls_policies.sql N'EST PAS monté ici en script d'init —
    # les tables qu'il référence sont créées par les migrations Prisma,
    # qui s'exécutent APRÈS le démarrage de Postgres (voir service `api`
    # ci-dessous et README_deploiement.md). Appliquer les policies RLS
    # manuellement une fois la première migration passée :
    #   docker compose exec postgres psql -U gymcloud_app -d gymcloud \
    #     -f /chemin/vers/rls_policies.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gymcloud_app']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Cache et files d'attente (BullMQ) ────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Stockage objets S3-compatible (logos, documents) ─────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-gymcloud_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_dev_only}
    ports:
      - '9000:9000'   # API S3
      - '9001:9001'   # Console web
    volumes:
      - minio_data:/data

  # ── API Backend NestJS ────────────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: 05_Infrastructure/docker/Dockerfile.backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gymcloud_app:${POSTGRES_PASSWORD:-changeme_dev_only}@postgres:5432/gymcloud?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-changeme_dev_only_min_32_characters}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_dev_only_min_32_characters}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-gymcloud_admin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-changeme_dev_only}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost}
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'

  # ── Frontend Next.js ───────────────────────────────────────────
  web:
    build:
      context: ../..
      dockerfile: 05_Infrastructure/docker/Dockerfile.frontend
      args:
        # NEXT_PUBLIC_API_URL doit être un ARG de build (figé dans le
        # bundle), pas seulement une variable d'exécution — voir le
        # commentaire dans Dockerfile.frontend. Sans ce bloc `args:`,
        # le frontend continuerait de pointer vers localhost même en
        # production, quoi que vous mettiez dans `environment:` ci-dessous.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
    ports:
      - '3001:3001'

  # ── Sites publics par salle (§3.2) ─────────────────────────────
  # Chemin /s/:subdomain sur le domaine principal — pas de sous-domaine
  # générique (*.gymcloud.sahelsystem.com) : demanderait un DNS wildcard
  # et un certificat wildcard (validation DNS-01), plus complexe à
  # maintenir sur cet hébergement que le mécanisme de repli par chemin
  # déjà prévu dans l'app (voir 08_Site_Public_Salles/middleware.ts).
  public-sites:
    build:
      context: ../..
      dockerfile: 05_Infrastructure/docker/Dockerfile.public-sites
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000/api/v1}
    ports:
      - '3002:3002'

  # ── Reverse proxy (TLS Let's Encrypt en production) ──────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
      - public-sites
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro

  # ── Renouvellement automatique du certificat TLS ─────────────
  # Première émission : voir README_deploiement.md (commande manuelle
  # ponctuelle) — ce service ne fait que le RENOUVELLEMENT continu
  # (vérifie deux fois par jour, ne renouvelle que si <30 jours restants).
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >-
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_certs:
  certbot_webroot:
