# Reverse proxy de développement/démonstration. En production,
# ajouter la terminaison TLS (Let's Encrypt / certbot) et restreindre
# les en-têtes exposés.
upstream gymcloud_api {
    server api:3000;
}

upstream gymcloud_web {
    server web:3001;
}

# Redirection HTTP -> HTTPS
server {
    listen 80;
    server_name gymcloud.sahelsystem.com www.gymcloud.sahelsystem.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;

    server_name gymcloud.sahelsystem.com www.gymcloud.sahelsystem.com;

    ssl_certificate /etc/letsencrypt/live/gymcloud.sahelsystem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gymcloud.sahelsystem.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://gymcloud_api;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://gymcloud_web;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
