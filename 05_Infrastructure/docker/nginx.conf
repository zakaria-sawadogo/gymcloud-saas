# Reverse proxy de développement/démonstration. En production,
# ajouter la terminaison TLS (Let's Encrypt / certbot) et restreindre
# les en-têtes exposés.

upstream gymcloud_api {
    server api:3000;
}

upstream gymcloud_web {
    server web:3001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # API backend — tout /api/* part vers NestJS
    location /api/ {
        proxy_pass http://gymcloud_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend Next.js — tout le reste
    location / {
        proxy_pass http://gymcloud_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
