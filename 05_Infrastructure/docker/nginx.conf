# Reverse proxy de production, avec TLS Let's Encrypt.
#
# ⚠️ Avant le tout premier démarrage, le certificat n'existe pas
# encore : gardez UNIQUEMENT le bloc "server { listen 80; ... }"
# ci-dessous actif (commentez tout le bloc "listen 443"), démarrez
# nginx, obtenez le certificat (voir README_deploiement.md), PUIS
# décommentez le bloc 443 et rechargez nginx. Une fois le certificat
# obtenu, le renouvellement est automatique (service `certbot` dans
# docker-compose.yml).
#
# Remplacez gymcloud.sahelsystem.com par votre propre domaine si besoin.

upstream gymcloud_api {
    server api:3000;
}

upstream gymcloud_web {
    server web:3001;
}

upstream gymcloud_public_sites {
    server public-sites:3002;
}

server {
    listen 80;
    server_name gymcloud.sahelsystem.com;

    # Requis par certbot pour valider le domaine (méthode webroot) —
    # ne JAMAIS rediriger ce chemin vers HTTPS, certbot y accède en HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste : redirection vers HTTPS une fois le certificat obtenu.
    # Avant l'obtention du premier certificat, remplacez temporairement
    # ce bloc par un simple proxy_pass (voir commentaire ci-dessus).
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name gymcloud.sahelsystem.com;

    ssl_certificate     /etc/letsencrypt/live/gymcloud.sahelsystem.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gymcloud.sahelsystem.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 10M;

    # API backend — tout /api/* part vers NestJS
    location /api/ {
        proxy_pass http://gymcloud_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # §3.2 — Sites publics par salle : gymcloud.sahelsystem.com/s/nomdelasalle
    # (chemin, pas sous-domaine — voir commentaire dans docker-compose.yml)
    location /s/ {
        proxy_pass http://gymcloud_public_sites;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend Next.js — tout le reste
    location / {
        proxy_pass http://gymcloud_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
